<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Container Status</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <header class="topbar">
    <h1 class="topbar__title">
      <a class="brandlink" href="/dashboard">Containers</a>
    </h1>

    <nav class="topnav__menu">
      <a class="navbtn" href="/dashboard" data-nav="dashboard">Dashboard</a>
      <a class="navbtn" href="/logs" data-nav="logs">Logs</a>
      <a class="navbtn" href="/status" data-nav="status">Status</a>
    </nav>
  </header>
  <div class="layout">
    <div class="panel">
      <h2>서버 / 컨테이너</h2>

      <div class="server-search">
        <input id="server-search-input" type="text" placeholder="서버 검색..." />
      </div>

      <div id="server-list" class="server-list">로딩 중...</div>

      <hr class="divider" />

      <div class="container-search is-hidden">
        <input id="container-search-input" type="text" placeholder="컨테이너 검색..." disabled />
      </div>

      <div id="container-list" class="container-list">
        <div class="empty-text">서버를 선택하세요.</div>
      </div>
    </div>

    <div class="panel">
      <div class="status-grid">

        <div class="sg-item sg-id">
          <div class="sg-label">Service</div>
          <div class="sg-value" id="sc-label">서버/컨테이너 선택 필요</div>
        </div>

        <div class="sg-item sg-status">
          <div class="sg-label">Status</div>
          <div class="sg-value" id="status-pill">status: -</div>
        </div>

        <div class="sg-item sg-uptime">
          <div class="sg-label">Uptime</div>
          <div class="sg-value" id="uptime-badge">uptime: -</div>
        </div>

        <div class="sg-item sg-lastupdate">
          <div class="sg-label">Last update</div>
          <div class="sg-value" id="last-update">-</div>
        </div>

        <button class="sg-item sg-metric metric-btn" data-metric="cpu_usage" type="button">
          <div class="sg-label">CPU %</div>
          <div class="sg-value"><span id="cpu-summary">-</span></div>
        </button>

        <button class="sg-item sg-metric metric-btn" data-metric="mem_usage" type="button">
          <div class="sg-label">MEM %</div>
          <div class="sg-value"><span id="mem-summary">-</span></div>
        </button>

        <button class="sg-item sg-metric metric-btn" data-metric="mem_usage_bytes" type="button">
          <div class="sg-label">MEM (bytes)</div>
          <div class="sg-value"><span id="mem-bytes-summary">-</span></div>
        </button>

        <button class="sg-item sg-metric metric-btn" data-metric="net_bytes" type="button">
          <div class="sg-label">NET (rx / tx)</div>
          <div class="sg-value"><span id="net-summary">-</span></div>
        </button>

      </div>

      <div id="metric-meta" class="metric-meta">메트릭을 선택하면 그래프와 시계열이 표시됩니다.</div>

      <div class="chart-panel">
        <canvas id="metricChart" height="120"></canvas>
      </div>

      <div class="metric-table">
        <table>
          <thead>
            <tr>
              <th class="col-ts">시간</th>
              <th class="col-val">값</th>
              <th class="col-extra">비고</th>
            </tr>
          </thead>
          <tbody id="metric-tbody">
            <tr><td colspan="3">메트릭을 선택하세요.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script defer src="/static/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script defer src="/static/status.js"></script>
</body>
</html>
