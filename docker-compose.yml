services:
  log-api:
    # Image is built and pushed by the CI pipeline.
    # For local development, build from source: `docker build -t logstorageapi .`
    image: ${REGISTRY_URL:-logstorageapi}:${IMAGE_TAG:-latest}
    container_name: log-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8810}:8810"
